<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TERMUX HACKER — 30 Days</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --green: #00ff41;
    --dark-green: #00b32c;
    --dim-green: #003b10;
    --bg: #0a0a0a;
    --card-bg: #0d1a0d;
    --border: #00ff4133;
    --red: #ff003c;
    --cyan: #00fff9;
    --yellow: #ffe600;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── MATRIX RAIN CANVAS ─── */
  #matrix-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.07;
    pointer-events: none;
  }

  /* ─── SCANLINE OVERLAY ─── */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,65,0.015) 2px,
      rgba(0,255,65,0.015) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* ─── WRAPPER ─── */
  .app-wrapper {
    position: relative;
    z-index: 2;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* ─── HEADER ─── */
  header {
    text-align: center;
    padding: 36px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .logo-glitch {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    color: var(--green);
    letter-spacing: 4px;
    text-shadow:
      0 0 8px var(--green),
      0 0 20px var(--green),
      0 0 40px var(--dark-green);
    animation: glitch 3s infinite;
    position: relative;
  }

  .logo-glitch::before,
  .logo-glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%;
  }
  .logo-glitch::before {
    color: var(--cyan);
    animation: glitch-1 3s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    opacity: 0.7;
  }
  .logo-glitch::after {
    color: var(--red);
    animation: glitch-2 3s infinite;
    clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
    opacity: 0.7;
  }

  @keyframes glitch {
    0%,90%,100% { transform: none; }
    91% { transform: skewX(-1deg); }
    93% { transform: skewX(1deg); }
    95% { transform: none; }
  }
  @keyframes glitch-1 {
    0%,90%,100% { transform: none; }
    91% { transform: translate(-3px, -1px); }
    93% { transform: translate(3px, 1px); }
  }
  @keyframes glitch-2 {
    0%,90%,100% { transform: none; }
    91% { transform: translate(3px, 1px); }
    93% { transform: translate(-3px, -1px); }
  }

  .header-sub {
    font-size: 0.78rem;
    color: var(--dark-green);
    letter-spacing: 6px;
    margin-top: 8px;
  }

  .header-badges {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 0.65rem;
    padding: 4px 12px;
    border: 1px solid var(--green);
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
    background: rgba(0,255,65,0.07);
    border-radius: 2px;
    animation: pulse-border 2s infinite;
  }
  .badge.red { border-color: var(--red); color: var(--red); background: rgba(255,0,60,0.07); }
  .badge.cyan { border-color: var(--cyan); color: var(--cyan); background: rgba(0,255,249,0.07); }

  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 4px currentColor; }
    50% { box-shadow: 0 0 12px currentColor; }
  }

  /* ─── TERMINAL PROMPT ─── */
  .terminal-bar {
    background: #0d1a0d;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 16px;
    margin-bottom: 24px;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .terminal-bar .prompt { color: var(--red); font-weight: bold; }
  .terminal-bar .path { color: var(--cyan); }
  .terminal-bar .cmd { color: var(--green); }
  .terminal-bar .cursor {
    display: inline-block;
    width: 9px; height: 15px;
    background: var(--green);
    animation: blink 1s step-end infinite;
    margin-left: 2px;
    vertical-align: middle;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ─── PROGRESS SECTION ─── */
  .progress-wrap {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 26px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    margin-bottom: 10px;
    color: var(--dark-green);
    letter-spacing: 2px;
  }
  .progress-bar-outer {
    height: 8px;
    background: #001a08;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--dim-green);
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--dark-green), var(--green));
    border-radius: 4px;
    transition: width 0.4s ease;
    box-shadow: 0 0 10px var(--green);
    width: 0%;
  }
  .progress-stats {
    display: flex;
    gap: 20px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .stat {
    font-size: 0.7rem;
    color: var(--dim-green);
  }
  .stat span { color: var(--green); font-size: 0.9rem; }

  /* ─── SEARCH ─── */
  .search-wrap {
    position: relative;
    margin-bottom: 24px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 12px 16px 12px 42px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    letter-spacing: 1px;
  }
  .search-wrap input:focus {
    border-color: var(--green);
    box-shadow: 0 0 15px rgba(0,255,65,0.2);
  }
  .search-wrap input::placeholder { color: #1a4a1a; }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--dark-green);
    font-size: 1rem;
  }

  /* ─── FILTER TABS ─── */
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .filter-tab {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 14px;
    border: 1px solid #1a4a1a;
    background: transparent;
    color: #1a6a1a;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .filter-tab:hover,
  .filter-tab.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,255,65,0.08);
    box-shadow: 0 0 8px rgba(0,255,65,0.3);
  }
  .filter-tab.active { box-shadow: 0 0 14px rgba(0,255,65,0.4); }

  /* ─── DAY CARDS ─── */
  .days-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .day-card {
    background: var(--card-bg);
    border: 1px solid #0d2e0d;
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
    cursor: pointer;
  }
  .day-card:hover {
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(0,255,65,0.15), inset 0 0 30px rgba(0,255,65,0.03);
    transform: translateX(3px);
  }
  .day-card.completed { border-color: #00552a; }
  .day-card.completed .day-header { background: rgba(0,255,65,0.05); }

  .day-header {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    gap: 14px;
    user-select: none;
  }

  .day-num {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--bg);
    background: var(--green);
    padding: 4px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
    min-width: 54px;
    text-align: center;
    box-shadow: 0 0 10px var(--green);
    flex-shrink: 0;
  }
  .day-card.completed .day-num { background: var(--dark-green); }

  .day-meta { flex: 1; min-width: 0; }
  .day-title {
    font-size: 0.9rem;
    color: var(--green);
    letter-spacing: 1px;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .day-subtitle {
    font-size: 0.68rem;
    color: #1a6a1a;
    letter-spacing: 1px;
  }

  .day-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .level-badge {
    font-size: 0.6rem;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid;
  }
  .level-badge.basic { border-color: var(--cyan); color: var(--cyan); background: rgba(0,255,249,0.08); }
  .level-badge.intermediate { border-color: var(--yellow); color: var(--yellow); background: rgba(255,230,0,0.08); }
  .level-badge.advanced { border-color: var(--red); color: var(--red); background: rgba(255,0,60,0.08); }
  .level-badge.expert { border-color: #ff6600; color: #ff6600; background: rgba(255,102,0,0.08); }

  .check-btn {
    width: 28px; height: 28px;
    border: 1px solid #1a4a1a;
    background: transparent;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .check-btn:hover { border-color: var(--green); background: rgba(0,255,65,0.1); }
  .day-card.completed .check-btn {
    border-color: var(--green);
    background: rgba(0,255,65,0.15);
    box-shadow: 0 0 8px rgba(0,255,65,0.4);
  }

  .expand-icon {
    color: var(--dark-green);
    font-size: 0.8rem;
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .day-card.open .expand-icon { transform: rotate(180deg); color: var(--green); }

  /* ─── DAY CONTENT ─── */
  .day-content {
    display: none;
    border-top: 1px solid #0d2e0d;
    padding: 20px 18px;
    animation: fadeIn 0.2s ease;
  }
  .day-card.open .day-content { display: block; }

  @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }

  .content-section { margin-bottom: 20px; }
  .section-label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--dark-green);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, #0d2e0d, transparent);
  }

  .desc-text {
    font-size: 0.82rem;
    color: #4a9a4a;
    line-height: 1.7;
    margin-bottom: 14px;
  }

  /* ─── COMMAND BLOCKS ─── */
  .cmd-list { display: flex; flex-direction: column; gap: 8px; }

  .cmd-item {
    background: #060f06;
    border: 1px solid #0d2e0d;
    border-left: 3px solid var(--green);
    border-radius: 3px;
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: background 0.2s, border-left-color 0.2s;
    cursor: pointer;
    position: relative;
  }
  .cmd-item:hover {
    background: #0a1a0a;
    border-left-color: var(--cyan);
  }
  .cmd-item:hover .copy-hint { opacity: 1; }
  .cmd-item.cyan-border { border-left-color: var(--cyan); }
  .cmd-item.yellow-border { border-left-color: var(--yellow); }
  .cmd-item.red-border { border-left-color: var(--red); }

  .cmd-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    color: var(--green);
    flex: 1;
    word-break: break-all;
  }
  .cmd-text .dollar { color: var(--red); margin-right: 6px; }
  .cmd-text .comment {
    display: block;
    font-size: 0.72rem;
    color: #2a5a2a;
    margin-top: 4px;
  }

  .copy-hint {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.6rem;
    color: var(--cyan);
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .copied-toast {
    position: fixed;
    bottom: 30px; right: 20px;
    background: rgba(0,255,65,0.1);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    padding: 10px 20px;
    border-radius: 4px;
    z-index: 1000;
    box-shadow: 0 0 20px rgba(0,255,65,0.3);
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 2px;
    pointer-events: none;
  }
  .copied-toast.show { opacity: 1; }

  /* ─── TIPS ─── */
  .tip-box {
    background: rgba(0,255,249,0.04);
    border: 1px solid rgba(0,255,249,0.2);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 0.78rem;
    color: var(--cyan);
    line-height: 1.6;
  }
  .tip-box .tip-icon { margin-right: 8px; }

  .warn-box {
    background: rgba(255,0,60,0.04);
    border: 1px solid rgba(255,0,60,0.25);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 0.78rem;
    color: var(--red);
    line-height: 1.6;
    margin-top: 8px;
  }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 30px 0;
    font-size: 0.68rem;
    color: #1a3a1a;
    letter-spacing: 3px;
    border-top: 1px solid #0d2e0d;
    margin-top: 40px;
  }
  footer span { color: var(--dark-green); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #003b10; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dark-green); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .day-title { font-size: 0.82rem; }
    .day-subtitle { display: none; }
    .level-badge { display: none; }
  }
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="app-wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo-glitch" data-text="TERMUX H4CKER">TERMUX H4CKER</div>
    <div class="header-sub">[ 30 DAYS MASTERY PROGRAM ]</div>
    <div class="header-badges">
      <div class="badge">🔥 30 Days</div>
      <div class="badge cyan">⚡ Basic → Expert</div>
      <div class="badge red">☠️ No Limits</div>
    </div>
  </header>

  <!-- TERMINAL BAR -->
  <div class="terminal-bar">
    <span class="prompt">root@kali</span>
    <span style="color:#1a6a1a">:</span>
    <span class="path">~/termux-mastery</span>
    <span style="color:#1a6a1a">$</span>
    <span class="cmd" id="typewriter"></span>
    <span class="cursor"></span>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-header">
      <span>[ MISSION PROGRESS ]</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar"></div>
    </div>
    <div class="progress-stats">
      <div class="stat">Completed: <span id="stat-done">0</span></div>
      <div class="stat">Remaining: <span id="stat-left">30</span></div>
      <div class="stat">Streak: <span id="stat-streak">0</span>🔥</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search commands, topics, days..." />
  </div>

  <!-- FILTER TABS -->
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">All Days</button>
    <button class="filter-tab" data-filter="basic">Basic</button>
    <button class="filter-tab" data-filter="intermediate">Intermediate</button>
    <button class="filter-tab" data-filter="advanced">Advanced</button>
    <button class="filter-tab" data-filter="expert">Expert</button>
    <button class="filter-tab" data-filter="completed">Completed</button>
  </div>

  <!-- DAYS GRID -->
  <div class="days-grid" id="days-grid"></div>

  <footer>
    TERMUX H4CKER &nbsp;|&nbsp; <span>30 DAYS MASTERY</span> &nbsp;|&nbsp; HACK THE PLANET ☠️
  </footer>
</div>

<!-- COPY TOAST -->
<div class="copied-toast" id="copy-toast">✓ COPIED TO CLIPBOARD</div>

<script>
// ═══════════════════════════════════════════════
//  DATA — 30 DAYS FULL TERMUX TUTORIAL
// ═══════════════════════════════════════════════
const DAYS = [
  {
    day: 1, level: 'basic',
    title: 'Termux Installation & First Boot',
    subtitle: 'Setup, Update & Basic Navigation',
    desc: 'Termux ek powerful terminal emulator hai Android ke liye. Pehle din hum install, update aur basic folder structure samjhenge.',
    commands: [
      { cmd: 'pkg update && pkg upgrade', comment: '// sabse pehle packages update karo' },
      { cmd: 'pkg install git', comment: '// git install karo' },
      { cmd: 'termux-setup-storage', comment: '// phone storage access do' },
      { cmd: 'whoami', comment: '// current user dekho' },
      { cmd: 'pwd', comment: '// current directory path' },
      { cmd: 'ls', comment: '// files list karo' },
      { cmd: 'ls -la', comment: '// hidden files ke saath list' },
      { cmd: 'clear', comment: '// terminal saaf karo' },
    ],
    tip: '💡 Hamesha pehle "pkg update && pkg upgrade" run karo naye session mein.',
    warn: '⚠️ F-Droid se download karo, Play Store wala outdated hai!'
  },
  {
    day: 2, level: 'basic',
    title: 'File System & Navigation',
    subtitle: 'cd, ls, mkdir, rm, cp, mv commands',
    desc: 'Linux file system ko navigate karna aur files/folders manage karna seekhenge.',
    commands: [
      { cmd: 'cd /sdcard', comment: '// phone storage mein jao' },
      { cmd: 'cd ~', comment: '// home directory pe jao' },
      { cmd: 'mkdir myhacks', comment: '// naya folder banao' },
      { cmd: 'mkdir -p a/b/c', comment: '// nested folders ek saath' },
      { cmd: 'touch file.txt', comment: '// empty file banao' },
      { cmd: 'cp file.txt copy.txt', comment: '// file copy karo' },
      { cmd: 'mv file.txt /sdcard/', comment: '// file move karo' },
      { cmd: 'rm -rf foldername', comment: '// folder forcefully delete karo' },
      { cmd: 'find / -name "*.txt" 2>/dev/null', comment: '// txt files search karo' },
    ],
    tip: '💡 Tab key se auto-complete hota hai command line mein.',
    warn: '⚠️ rm -rf se dhyan se — yeh seedha delete karta hai, no trash!'
  },
  {
    day: 3, level: 'basic',
    title: 'Text Editing — Nano & Vim',
    subtitle: 'File create, edit, save',
    desc: 'Terminal mein text files edit karna — nano (easy) aur vim (powerful) dono seekhenge.',
    commands: [
      { cmd: 'pkg install nano vim', comment: '// editors install karo' },
      { cmd: 'nano myfile.txt', comment: '// nano mein file kholo' },
      { cmd: 'vim myfile.txt', comment: '// vim mein file kholo' },
      { cmd: 'cat myfile.txt', comment: '// file content terminal pe dikhao' },
      { cmd: 'head -5 file.txt', comment: '// pehli 5 lines dikhao' },
      { cmd: 'tail -5 file.txt', comment: '// aakhri 5 lines dikhao' },
      { cmd: 'grep "word" file.txt', comment: '// file mein word dhundho' },
      { cmd: 'wc -l file.txt', comment: '// total lines count karo' },
    ],
    tip: '💡 Nano mein Ctrl+X se exit, Ctrl+S se save karo.',
    warn: null
  },
  {
    day: 4, level: 'basic',
    title: 'Package Manager — PKG & APT',
    subtitle: 'Install, Remove, Search packages',
    desc: 'Termux ka apna package manager hai. Tools install, remove, search karna seekhenge.',
    commands: [
      { cmd: 'pkg list-all', comment: '// available sare packages dekho' },
      { cmd: 'pkg list-installed', comment: '// installed packages dekho' },
      { cmd: 'pkg search python', comment: '// python naam se search karo' },
      { cmd: 'pkg install python', comment: '// python install karo' },
      { cmd: 'pkg uninstall python', comment: '// python remove karo' },
      { cmd: 'pkg reinstall nano', comment: '// nano reinstall karo' },
      { cmd: 'apt-get autoremove', comment: '// unused packages clean karo' },
      { cmd: 'pkg info git', comment: '// package ki info dekho' },
    ],
    tip: '💡 "pkg" faster hai "apt" se Termux mein.',
    warn: null
  },
  {

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let completed = JSON.parse(localStorage.getItem('termux_completed') || '[]');
let currentFilter = 'all';
let searchQuery = '';

// ═══════════════════════════════════════════════
//  MATRIX RAIN
// ═══════════════════════════════════════════════
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const cols = Math.floor(canvas.width / 20);
const drops = Array(cols).fill(1);
function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = '15px Share Tech Mono';
  const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
  for (let i = 0; i < drops.length; i++) {
    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 20, drops[i] * 20);
    if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ═══════════════════════════════════════════════
//  TYPEWRITER
// ═══════════════════════════════════════════════
const cmds = ['./recon_master.sh target.com', 'nmap -sV 192.168.1.0/24', 'python3 exploit.py --target localhost', 'hydra -l root -P rockyou.txt ssh://192.168.1.1', 'msfconsole -q -x "use exploit/multi/handler"'];
let tIdx = 0, cIdx = 0, deleting = false;
const tw = document.getElementById('typewriter');
function type() {
  const current = cmds[tIdx];
  if (!deleting) {
    tw.textContent = current.slice(0, ++cIdx);
    if (cIdx === current.length) { deleting = true; setTimeout(type, 2000); return; }
  } else {
    tw.textContent = current.slice(0, --cIdx);
    if (cIdx === 0) { deleting = false; tIdx = (tIdx + 1) % cmds.length; }
  }
  setTimeout(type, deleting ? 40 : 80);
}
type();

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function updateProgress() {
  const done = completed.length;
  const pct = Math.round((done / 30) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-left').textContent = 30 - done;
  // streak
  let streak = 0;
  for (let i = 1; i <= 30; i++) {
    if (completed.includes(i)) streak++;
    else break;
  }
  document.getElementById('stat-streak').textContent = streak;
}

function renderDays() {
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';
  const filtered = DAYS.filter(d => {
    const matchFilter =
      currentFilter === 'all' ||
      currentFilter === d.level ||
      (currentFilter === 'completed' && completed.includes(d.day));
    const q = searchQuery.toLowerCase();
    const matchSearch =
      !q ||
      d.title.toLowerCase().includes(q) ||
      d.subtitle.toLowerCase().includes(q) ||
      d.commands.some(c => c.cmd.toLowerCase().includes(q) || c.comment.toLowerCase().includes(q));
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="text-align:center;color:#1a4a1a;font-size:.9rem;padding:40px;letter-spacing:2px;">[ NO RESULTS FOUND ]</div>';
    return;
  }

  filtered.forEach(d => {
    const isDone = completed.includes(d.day);
    const card = document.createElement('div');
    card.className = 'day-card' + (isDone ? ' completed' : '');
    card.innerHTML = `
      <div class="day-header">
        <div class="day-num">DAY ${String(d.day).padStart(2,'0')}</div>
        <div class="day-meta">
          <div class="day-title">${d.title}</div>
          <div class="day-subtitle">${d.subtitle}</div>
        </div>
        <div class="day-right">
          <div class="level-badge ${d.level}">${d.level.toUpperCase()}</div>
          <button class="check-btn" data-day="${d.day}" title="Mark complete">${isDone ? '✓' : '○'}</button>
          <div class="expand-icon">▼</div>
        </div>
      </div>
      <div class="day-content">
        <div class="content-section">
          <div class="section-label">[ OVERVIEW ]</div>
          <div class="desc-text">${d.desc}</div>
        </div>
        <div class="content-section">
          <div class="section-label">[ COMMANDS ]</div>
          <div class="cmd-list">
            ${d.commands.map(c => `
              <div class="cmd-item" data-cmd="${c.cmd.replace(/"/g,'&quot;')}">
                <div class="cmd-text">
                  <span class="dollar">$</span>${c.cmd}
                  <span class="comment">${c.comment}</span>
                </div>
                <span class="copy-hint">COPY</span>
              </div>
            `).join('')}
          </div>
        </div>
        ${d.tip ? `<div class="content-section"><div class="tip-box"><span class="tip-icon">💡</span>${d.tip}</div></div>` : ''}
        ${d.warn ? `<div class="warn-box">⚠️ ${d.warn}</div>` : ''}
      </div>
    `;

    // Toggle expand
    card.querySelector('.day-header').addEventListener('click', (e) => {
      if (e.target.closest('.check-btn')) return;
      card.classList.toggle('open');
    });

    // Check/uncheck
    card.querySelector('.check-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const day = parseInt(e.currentTarget.dataset.day);
      if (completed.includes(day)) {
        completed = completed.filter(x => x !== day);
      } else {
        completed.push(day);
      }
      localStorage.setItem('termux_completed', JSON.stringify(completed));
      renderDays();
      updateProgress();
    });

    // Copy command
    card.querySelectorAll('.cmd-item').forEach(item => {
      item.addEventListener('click', () => {
        const cmd = item.dataset.cmd;
        navigator.clipboard.writeText(cmd).then(() => {
          const toast = document.getElementById('copy-toast');
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2000);
        }).catch(() => {});
      });
    });

    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════
//  FILTER TABS
// ═══════════════════════════════════════════════
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderDays();
  });
});

// ═══════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderDays();
});

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
renderDays();
updateProgress();
</script>
